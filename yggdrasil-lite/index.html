<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yggdrasil – Deep Research Tool</title>
  <meta name="description"
    content="Yggdrasil: AI-powered deep research synthesizer. Enter any topic and receive a fully cited, IEEE-style research report in seconds.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">

  <!-- PDF generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- DOCX generation -->
  <script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>
  <!-- Markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="./static/css/scientific-theme.css">
</head>

<body>
  <div class="container">
    <!-- Header -->
    <header>
      <h1 class="logo">🌳 Yggdrasil</h1>
      <p class="tagline">Deep knowledge from the world tree &bull; AI-powered research synthesis</p>
      <p class="tagline" style="font-size:0.78rem; margin-top:0.3rem; color: var(--text-muted);">
        Powered by Gemini &amp; Tavily &bull; Lite Edition
      </p>
    </header>

    <!-- Mute Button -->
    <button id="mute-toggle" class="mute-btn-fixed" title="Toggle Music">🔊</button>

    <!-- Background Music -->
    <audio id="background-music" loop autoplay preload="auto">
      <source src="./static/audio/Skyfall.mp3" type="audio/mpeg">
    </audio>

    <!-- Main Form -->
    <div class="glass-card">
      <form id="research-form">
        <!-- Topic -->
        <div class="form-group">
          <label for="topic">Research Topic</label>
          <textarea id="topic" name="topic"
            placeholder="Enter your research topic (e.g., 'Quantum Computing Applications in Cryptography')"
            required></textarea>
        </div>

        <!-- Output Format -->
        <div class="form-group">
          <label>Output Format</label>
          <div class="format-options">
            <div class="format-option">
              <input type="radio" id="format-screen" name="format" value="screen" checked>
              <label for="format-screen">📱 On Screen</label>
            </div>
            <div class="format-option">
              <input type="radio" id="format-pdf" name="format" value="pdf">
              <label for="format-pdf">📄 PDF</label>
            </div>
            <div class="format-option">
              <input type="radio" id="format-docx" name="format" value="docx">
              <label for="format-docx">📝 DOCX</label>
            </div>
            <div class="format-option">
              <input type="radio" id="format-both" name="format" value="both">
              <label for="format-both">📦 Both Files</label>
            </div>
          </div>
        </div>

        <!-- Depth -->
        <div class="form-group">
          <label for="depth">Research Depth</label>
          <select id="depth" name="depth">
            <option value="quick">Quick (3 queries, ~800 words, ~20 sec)</option>
            <option value="standard" selected>Standard (5 queries, ~1500 words, ~40 sec)</option>
            <option value="deep">Deep (8 queries, ~2500 words, ~60 sec)</option>
          </select>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary" id="submit-btn">
          Start Research
        </button>
      </form>
    </div>

    <!-- Progress Section -->
    <div id="progress-section" class="progress-section glass-card">
      <h2 style="margin-bottom: 1rem; color: var(--primary-color);">Research in Progress</h2>
      <div class="progress-bar-container">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
      <p id="progress-message" class="progress-message">Initializing...</p>
    </div>

    <!-- Results Section -->
    <div id="results-section" class="results-section glass-card">
      <h2 style="margin-bottom: 1rem; color: var(--success-color);">✓ Research Complete</h2>

      <div id="result-content" class="result-content"></div>

      <div class="download-buttons">
        <button id="download-pdf" class="btn btn-download" style="display:none;">📄 Download PDF</button>
        <button id="download-docx" class="btn btn-download" style="display:none;">📝 Download DOCX</button>
        <button class="btn btn-download" onclick="location.reload()">🔄 New Research</button>
      </div>
    </div>
  </div>

  <!-- App Script -->
  <script src="./static/js/app.js"></script>
</body>

</html>
